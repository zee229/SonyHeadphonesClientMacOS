name: Build

on:
  push:
    branches: [macos-only, main]
  pull_request:
    branches: [macos-only, main]
  workflow_dispatch:

jobs:
  build-swift:
    name: Build SwiftUI Client
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Run MDRProtocol tests
      run: swift test --package-path MDRProtocol

    - name: Build SwiftUI app
      run: |
        chmod +x build_app.sh
        ./build_app.sh

    - name: Create DMG
      run: |
        chmod +x build_dmg.sh
        ./build_dmg.sh

    - name: Upload App
      uses: actions/upload-artifact@v4
      with:
        name: SonyHeadphones-macos
        path: build/SonyHeadphones-*.dmg
