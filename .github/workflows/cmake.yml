name: Build

on:
  push:
    branches: [macos-only, main]
  pull_request:
    branches: [macos-only, main]
  workflow_dispatch:

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  build-legacy:
    name: Build Legacy Client (Universal)
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

    - name: Build
      run: cmake --build build --config $BUILD_TYPE --target SonyHeadphonesClient

    - name: Pack
      working-directory: build/client
      run: zip -r SonyHeadphonesClient.zip SonyHeadphonesClient.app

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SonyHeadphonesClient-legacy-macos-universal
        path: build/client/SonyHeadphonesClient.zip

  build-swift:
    name: Build SwiftUI Client
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true

    - name: Build libmdr
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE
        cmake --build build --target mdr mdr_PlatformMacOS

    - name: Build SwiftUI app
      run: |
        chmod +x build_app.sh
        ./build_app.sh

    - name: Create DMG
      run: |
        chmod +x build_dmg.sh
        ./build_dmg.sh

    - name: Upload App
      uses: actions/upload-artifact@v4
      with:
        name: SonyHeadphones-macos
        path: build/SonyHeadphones-*.dmg
